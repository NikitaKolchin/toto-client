user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
    worker_connections 768;
}

http {
    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL Settings
    ##
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    ##
    # Logging
    ##
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    ##
    # Gzip
    ##
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    ##
    # HTTP -> HTTPS
    ##
    server {
        listen 80;
        listen [::]:80;

        server_name 26toto.ru www.26toto.ru;

        return 301 https://26toto.ru$request_uri;
    }

    ##
    # HTTPS
    ##
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        server_name 26toto.ru www.26toto.ru;

        root /srv/www/toto-client/build;
        index index.html;

        ssl_certificate /etc/letsencrypt/live/26toto.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/26toto.ru/privkey.pem;

        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        ##
        # Frontend SPA
        ##
        location / {
            try_files $uri $uri/ /index.html;
        }

        ##
        # Backend API
        ##
        location /api/ {
            proxy_pass http://127.0.0.1:3000/api/;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        ##
        # Static files
        ##
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        ##
        # Security headers
        ##
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        ##
        # Logs
        ##
        access_log /var/log/nginx/toto-access.log main;
        error_log /var/log/nginx/toto-error.log;
    }
}
